# LiveKit MCU config TEMPLATE — do not put real secrets here.
# LAB-DEFAULT-CREDS-AND-IMAGE-PIN-V1: scripts/START-LIVEKIT.ps1 writes
# docker/livekit.runtime.yaml (gitignored) with HOST + FM_LIVEKIT_* keys.
port: 7880
bind_addresses:
  - ""
rtc:
  tcp_port: 7881
  # Match docker/livekit.compose.yaml UDP publish (avoid Windows excluded 50000-50459).
  port_range_start: 51000
  port_range_end: 51100
  # Patched into runtime from .env HOST
  node_ip: 127.0.0.1
  use_external_ip: false
keys:
  # Placeholder only — replaced in livekit.runtime.yaml at start
  PLACEHOLDER_KEY: PLACEHOLDER_SECRET
redis:
  address: redis:6379
logging:
  level: info
room:
  empty_timeout: 600
  max_participants: 12
ingress:
  rtmp_base_url: rtmp://127.0.0.1:1935/x
