# mob-wvp-zlm-modern-split — modern ZLM + WVP 2.7.3 (split)
#
# Images:
#   zlmediakit/zlmediakit:master  — current ZLM
#   gemcjz/wvp-pro:latest         — WVP 2.7.3 (Java only; external ZLM)
#   postgres:15-alpine + valkey/valkey:8-alpine (BSD-3-Clause)
#
# ENTERPRISE-REDIS-IMAGE-LEGAL-PIN-V1 — Valkey replaces redis:7-alpine.
# Container DNS name stays me8-wvp-redis for WVP env compatibility.
# Do NOT swap back to redis:* (SSPL/RSAL/AGPL risk on floating tags).
#
# Fossil all-in-one (2021): docker-compose.wvp-fossil.yml (648540858/wvp_pro)
#
# Fleet BWC wall still uses me8-zlm (docker/zlm.compose.yml) + SIP 5060 — untouched.
#
# Start:  .\START-WVP-LAB.bat
# Stop:   .\STOP-WVP-LAB.bat

services:

  wvp-redis:
    image: valkey/valkey:8-alpine
    container_name: me8-wvp-redis
    restart: unless-stopped
    command: ["valkey-server", "--requirepass", "root"]
    environment:
      TZ: Asia/Singapore

  wvp-db:
    image: postgres:15-alpine
    container_name: me8-wvp-db
    restart: unless-stopped
    environment:
      TZ: Asia/Singapore
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root123
      POSTGRES_DB: wvp2
    volumes:
      # Official wvp-GB28181-pro 2.7.3 PostgreSQL schema + admin/admin (md5)
      - ./mysql-init/01-init-wvp2-pg.sql:/docker-entrypoint-initdb.d/01-init-wvp2.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d wvp2"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s

  wvp-zlm:
    image: zlmediakit/zlmediakit:master
    container_name: me8-wvp-zlm
    restart: unless-stopped
    environment:
      TZ: Asia/Singapore
    volumes:
      - ./zlm-modern/config.ini:/opt/media/conf/config.ini
    ports:
      # Lab play URLs use :80 (same strategy as fossil stack)
      - "80:80"
      - "18088:80"
      - "19355:1935"
      - "10000:10000"
      - "10000:10000/udp"
      - "30000-30100:30000-30100/udp"
      - "30000-30100:30000-30100/tcp"

  wvp:
    image: gemcjz/wvp-pro:latest
    container_name: me8-wvp
    restart: unless-stopped
    depends_on:
      wvp-db:
        condition: service_healthy
      wvp-redis:
        condition: service_started
      wvp-zlm:
        condition: service_started
    environment:
      TZ: Asia/Singapore
      # Cameras register to this LAN IP (from START-WVP-LAB.ps1 → .env HOST)
      WVP_HOST: ${WVP_HOST_IP:-192.168.1.38}
      WVP_PORT: "5060"
      WVP_DOMAIN: "4401020049"
      WVP_ID: "44010200492000000001"
      WVP_PWD: "admin123"
      ZLM_HOST: me8-wvp-zlm
      ZLM_PORT: "80"
      REDIS_HOST: me8-wvp-redis
      REDIS_PORT: "6379"
      REDIS_PWD: root
    volumes:
      - ./wvp-config/application-modern.yml:/opt/wvp/config/application.yml:ro
    ports:
      - "18080:18080"
      - "5061:5060/udp"
      - "5061:5060/tcp"
