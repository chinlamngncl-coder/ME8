# ZLMediaKit sidecar for ME8 ZLM test bench (optional).
# Start: docker compose -f docker/zlm.compose.yml up -d
# Stop:  docker compose -f docker/zlm.compose.yml down
#
# Match FM_ZLM_HTTP and FM_ZLM_SECRET in .env

services:
  zlmediakit:
    image: zlmediakit/zlmediakit:master
    container_name: me8-zlm
    restart: unless-stopped
    ports:
      - "80:80"
      - "1935:1935"
      - "554:554"
    environment:
      TZ: UTC
    volumes:
      - ./zlm-config:/opt/media/conf
