<!DOCTYPE html>
<html lang="en" class="enterprise-auth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <title>Recovery email &mdash; Ubitron Mobility C2</title>
    <link rel="stylesheet" href="/css/global.css?v=20260723-global-ui-rollout-v1">
</head>
<body class="enterprise-auth">
    <div class="login-card enterprise-card login-card--wide">
        <h1 class="auth-title" data-i18n="recoveryEmail.title">Recovery email</h1>
        <p class="setup-hint" data-i18n="recoveryEmail.setupHint">Add an email for password reset and lost-authenticator recovery. We send a one-time link to verify it.</p>
        <p id="recovery-error" role="alert"></p>
        <p id="recovery-ok" role="status"></p>
        <p id="recovery-status-line" class="setup-hint" hidden></p>
        <form id="recovery-email-form">
            <label><span data-i18n="recoveryEmail.address">Recovery email address</span>
                <input type="email" id="recovery-email-input" class="login-input" autocomplete="email" required>
            </label>
            <button type="submit" class="btn-primary btn-block" id="recovery-send-btn" data-i18n="recoveryEmail.sendVerify">Send verification email</button>
        </form>
        <button type="button" class="btn-secondary btn-block" id="recovery-resend-btn" hidden data-i18n="recoveryEmail.resend">Resend verification email</button>
        <button type="button" class="btn-primary btn-block" id="recovery-continue-btn" hidden data-i18n="recoveryEmail.continueDashboard">Continue to dashboard</button>
        <p class="logout-link"><button type="button" id="recovery-logout" data-i18n="mustChangePassword.logout">Sign out</button></p>
    </div>
    <script src="/js/i18n.js"></script>
    <script src="/js/operator-error-voice.js?v=20260702-op-voice-unified"></script>
    <script src="/js/operator-ui.js?v=20260702-op-voice-unified"></script>
    <script src="/js/auth-form-busy.js?v=20260701-auth-busy-unified"></script>
    <script src="/js/recovery-email-page.js?v=20260706-recovery-email"></script>
</body>
</html>
