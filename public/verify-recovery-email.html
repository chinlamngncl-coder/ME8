<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <title>Verify recovery email — Ubitron Mobility C2</title>
    <style>
        * { box-sizing: border-box; }
        html, body {
            margin: 0; min-height: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(160deg, #0f172a 0%, #1e293b 45%, #0f172a 100%);
            color: #e2e8f0; display: flex; align-items: center; justify-content: center; padding: 24px;
        }
        .login-card { width: 100%; max-width: 420px; background: rgba(30,41,59,.95); border: 1px solid #475569; border-radius: 12px; padding: 28px 24px; text-align: center; }
        .setup-hint { font-size: 13px; color: #94a3b8; line-height: 1.5; margin: 12px 0 0; }
        #verify-msg { font-size: 15px; margin: 0; }
        .btn-primary { display: inline-block; margin-top: 16px; padding: 11px 20px; border: none; border-radius: 8px; background: #2563eb; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; }
        .err { color: #fecaca; }
        .ok { color: #bbf7d0; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1 style="margin:0 0 8px;font-size:18px" data-i18n="recoveryEmail.verifyTitle">Verify recovery email</h1>
        <p id="verify-msg" class="setup-hint" data-i18n="recoveryEmail.verifyWorking">Verifying…</p>
        <a id="verify-login-link" class="btn-primary" href="/login.html" hidden data-i18n="recoveryEmail.backToSignIn">Back to sign in</a>
    </div>
    <script src="/js/i18n.js"></script>
    <script src="/js/verify-recovery-email.js?v=20260706-recovery-email"></script>
</body>
</html>
