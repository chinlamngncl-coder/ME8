# Mobility enterprise runtime — Valkey + PostgreSQL (Wave 0)
# App (server.js) runs on the host; point env at these services after mob-env-enterprise.
# Env template: ../.env.enterprise.example — docs/ME8-ENV-ENTERPRISE.md
#
#   docker compose -f docker/docker-compose.enterprise.yml up -d
#   docker compose -f docker/docker-compose.enterprise.yml ps
#
# Host URLs (default ports):
#   FM_REDIS_URL=redis://127.0.0.1:6379
#   FM_CATALOG_DB_URL=postgresql://mobility:mobility_dev_change_me@127.0.0.1:5432/mobility
#
# Degrade tests: docker stop mobility-valkey | mobility-postgres (see docs/google-feedback-discussion/07)

name: mobility-enterprise

services:
  valkey:
    image: valkey/valkey:8-alpine
    container_name: mobility-valkey
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - mobility_valkey_data:/data
    command:
      - valkey-server
      - --save
      - "60"
      - "1"
      - --appendonly
      - "yes"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  postgres:
    image: postgres:16-alpine
    container_name: mobility-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: mobility
      POSTGRES_PASSWORD: mobility_dev_change_me
      POSTGRES_DB: mobility
    volumes:
      - mobility_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mobility -d mobility"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mobility_valkey_data:
  mobility_postgres_data:
