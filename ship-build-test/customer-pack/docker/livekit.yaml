port: 7880
bind_addresses:
  - ""
rtc:
  tcp_port: 7881
  # Match docker/livekit.compose.yaml UDP publish (avoid Windows excluded 50000-50459).
  port_range_start: 51000
  port_range_end: 51100
  # Must be reachable from browsers/phones on the LAN — match Mobility HOST in .env
  node_ip: 192.168.1.38
  use_external_ip: false
keys:
  devkey: secret
redis:
  address: redis:6379
logging:
  level: info
room:
  empty_timeout: 600
  max_participants: 12
ingress:
  rtmp_base_url: rtmp://192.168.1.38:1935/x
