# LiveKit MCU + egress recording for Mobility Video Conference
# Usage: docker compose -f docker/livekit.compose.yaml up -d
# Recordings land in ../storage/conference-recordings (same folder Mobility serves).
#
# ENTERPRISE-REDIS-IMAGE-LEGAL-PIN-V1 — DNS name "redis" kept for LiveKit config;
# image is Valkey (BSD-3-Clause). Do NOT swap back to redis:*.
services:
  redis:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    command: ["valkey-server"]

  livekit:
    image: livekit/livekit-server:v1.8.4
    command: --config /etc/livekit.yaml
    restart: unless-stopped
    depends_on:
      - redis
    ports:
      - "7880:7880"
      - "7881:7881"
      # Windows may reserve UDP 50000-50459 (Hyper-V/WSL); use 51000-51100 on lab hosts.
      - "51000-51100:51000-51100/udp"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro

  egress:
    image: livekit/egress:v1.8.4
    restart: unless-stopped
    depends_on:
      - livekit
      - redis
    environment:
      EGRESS_CONFIG_BODY: |
        api_key: devkey
        api_secret: secret
        ws_url: ws://livekit:7880
        redis:
          address: redis:6379
        insecure: true
    volumes:
      - ../storage/conference-recordings:/recordings

  ingress:
    image: livekit/ingress:latest
    restart: unless-stopped
    depends_on:
      - livekit
      - redis
    ports:
      - "1935:1935"
    environment:
      INGRESS_CONFIG_BODY: |
        api_key: devkey
        api_secret: secret
        ws_url: ws://livekit:7880
        redis:
          address: redis:6379
        rtmp_port: 1935
        logging:
          level: info
        insecure: true
