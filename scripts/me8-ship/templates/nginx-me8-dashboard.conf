# ME8 dashboard — nginx TLS front (Linux / Windows nginx).
# Terminates HTTPS for operators; Fleet HTTP stays on 127.0.0.1:3988.
# Replace DISPATCH_HOST and certificate paths before enable.

upstream me8_fleet_http {
    server 127.0.0.1:3988;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    server_name DISPATCH_HOST;

    ssl_certificate     /etc/ssl/me8/fullchain.pem;
    ssl_certificate_key /etc/ssl/me8/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://me8_fleet_http;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# After nginx reload:
# 1. Site admin: Settings → Operator login URL → https://DISPATCH_HOST → Save
#    (Trust reverse proxy enables automatically when URL is https://)
# Video WS :3989 (or FM_VIDEO_WS_PORT) — open on LAN; not proxied in v1 default layout.
